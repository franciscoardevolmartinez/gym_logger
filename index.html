<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: -apple-system, sans-serif; margin: 16px; }
    h1 { font-size: 22px; }
    input, select, button {
      font-size: 18px; padding: 8px; margin: 4px 0;
    }
    button { width: 100%; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .pr { font-weight: bold; }
    .newpr { color: green; }
    .section { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>PR Tracker</h1>

  <div class="row">
    <select id="exercise"></select>
    <input id="value" type="number" placeholder="Weight" />
  </div>
  <button onclick="log()">+ Log</button>

  <div class="section">
    <h2>PRs</h2>
    <div id="prs"></div>
  </div>

  <div class="section">
    <h2>Recent</h2>
    <div id="recent"></div>
  </div>

  <div class="section">
    <h3>Add Exercise</h3>
    <input id="newEx" placeholder="New exercise" />
    <button onclick="addExercise()">Add</button>
  </div>

<script>
let data = JSON.parse(localStorage.getItem("prdata")) || {
  exercises: [
    { name: "Bench press", unit: "kg", type: "weight" },
    { name: "Dumbbell bench press", unit: "kg", type: "weight" }
    { name: "Handstand", unit: "sec", type: "time" }
  ],
  logs: []
};

function save() {
  localStorage.setItem("prdata", JSON.stringify(data));
}

// --- UNIT CONVERSION ---
function toInternal(value, unit, type) {
  if (type === "weight") {
    if (unit === "lbs") return value * 0.453592;
    return value; // kg
  }
  if (type === "time") {
    if (unit === "min") return value * 60;
    return value; // sec
  }
}

function fromInternal(value, unit, type) {
  if (type === "weight") {
    if (unit === "lbs") return value / 0.453592;
    return value;
  }
  if (type === "time") {
    if (unit === "min") return value / 60;
    return value;
  }
}

// --- RENDER ---
function render() {
  let exSel = document.getElementById("exercise");

  exSel.innerHTML = data.exercises
    .map(e => `<option value="${e.name}">${e.name}</option>`)
    .join("");

  let prs = {};
  data.logs.forEach(l => {
    prs[l.exercise] = Math.max(prs[l.exercise] || 0, l.value);
  });

  document.getElementById("prs").innerHTML =
    data.exercises.map(e => {
      let val = prs[e.name];
      let display = val ? fromInternal(val, e.unit, e.type).toFixed(1) : "-";
      return `<div class="pr">${e.name}: ${display} ${e.unit}</div>`;
    }).join("");

  let recent = [...data.logs].reverse().slice(0, 10);

  document.getElementById("recent").innerHTML =
    recent.map(l => {
      let ex = data.exercises.find(e => e.name === l.exercise);
      let display = fromInternal(l.value, ex.unit, ex.type).toFixed(1);

      let isPR = l.value === Math.max(...data.logs
        .filter(x => x.exercise === l.exercise)
        .map(x => x.value));

      return `<div>${l.exercise} ${display} ${ex.unit} ${isPR ? "🔥" : ""}</div>`;
    }).join("");
}

// --- LOG ---
function log() {
  let exName = document.getElementById("exercise").value;
  let inputUnit = document.getElementById("inputUnit").value;
  let val = Number(document.getElementById("value").value);

  if (!val) return;

  let ex = data.exercises.find(e => e.name === exName);
  let internal = toInternal(val, inputUnit, ex.type);

  data.logs.push({
    exercise: exName,
    value: internal,
    date: new Date().toISOString()
  });

  document.getElementById("value").value = "";
  save();
  render();
}

// --- ADD EXERCISE ---
function addExercise() {
  let name = document.getElementById("newEx").value;
  let unit = document.getElementById("unit").value;

  if (!name) return;

  let type = (unit === "kg" || unit === "lbs") ? "weight" : "time";

  data.exercises.push({ name, unit, type });

  document.getElementById("newEx").value = "";
  save();
  render();
}

render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
